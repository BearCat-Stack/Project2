<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn Email Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
  <body class="bg-gray-50 p-8 max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold mb-2">LinkedIn Outreach Email Generator</h1>
    <p class="text-gray-500 mb-6 text-sm">Powered by Google Gemini · Sends via Gmail</p>

  <!-- Step 1: Connect Gmail -->
  <div class="bg-white border rounded-lg p-4 mb-6">
      <p class="font-semibold mb-2">Step 1: Connect Your Gmail Account</p>
    <a href="/auth" class="inline-block bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm">
      Connect Gmail
    </a>
      <p class="text-xs text-gray-400 mt-2">Only needed once. Authorizes sending emails on your behalf.</p>
    </div>

    <!-- Step 2: Paste LinkedIn data -->
    <div class="bg-white border rounded-lg p-4 mb-6">
      <p class="font-semibold mb-2">Step 2: Paste LinkedIn Profile Data</p>
    <textarea id="linkedinData" rows="8"
      class="w-full border rounded p-3 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-green-400"
        placeholder="Paste the person's name, title, company, About section, experience, etc..."></textarea>
      <button onclick="generateEmail()"
        id="generateBtn"
        class="mt-3 bg-green-600 text-white px-5 py-2 rounded hover:bg-green-700 text-sm font-medium">
        Generate Email with Gemini
    </button>
    </div>

    <!-- Step 3: Review & send -->
    <div id="output" class="hidden bg-white border rounded-lg p-4">
      <p class="font-semibold mb-3">Step 3: Review, Edit &amp; Send</p>

      <label class="block text-sm font-medium mb-1">Recipient Email Address</label>
    <input id="toEmail" type="email"
      class="w-full border rounded p-2 mb-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        placeholder="recipient@example.com" />

      <label class="block text-sm font-medium mb-1">Subject Line</label>
      <input id="subject" type="text"
        class="w-full border rounded p-2 mb-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />

      <label class="block text-sm font-medium mb-1">Email Body</label>
      <textarea id="emailBody" rows="12"
        class="w-full border rounded p-3 mb-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>

      <div class="flex gap-3 flex-wrap">
        <button onclick="copyEmail()"
          class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700 text-sm">
          Copy to Clipboard
      </button>
      <button onclick="sendEmail()"
        id="sendBtn"
        class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm">
          Send via Gmail
      </button>
    </div>

    <div id="statusMsg" class="mt-3 text-sm hidden"></div>
    </div>

    <script>
      async function generateEmail() {
        const linkedinData = document.getElementById('linkedinData').value.trim();
      if (!linkedinData) {
        alert('Please paste LinkedIn profile data first.');
        return;
      }

      const btn = document.getElementById('generateBtn');
      btn.textContent = 'Generating...';
      btn.disabled = true;
      btn.classList.add('opacity-50');

      try {
        const res = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ linkedinData }),
          });
        const data = await res.json();

        if (data.error) {
          alert('Error: ' + data.error);
          return;
}

        document.getElementById('subject').value = data.subject;
        document.getElementById('emailBody').value = data.body;
        document.getElementById('output').classList.remove('hidden');
        document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
} catch (err) {
        alert('Something went wrong. Check the console.');
        console.error(err);
} finally {
        btn.textContent = 'Generate Email with Gemini';
        btn.disabled = false;
        btn.classList.remove('opacity-50');
}
}

    function copyEmail() {
      const subject = document.getElementById('subject').value;
      const body = document.getElementById('emailBody').value;
      navigator.clipboard.writeText(`Subject: ${subject}\n\n${body}`);
      showStatus('Copied to clipboard!', 'green');
}

    async function sendEmail() {
      const to = document.getElementById('toEmail').value.trim();
      const subject = document.getElementById('subject').value.trim();
      const body = document.getElementById('emailBody').value.trim();

      if (!to) { alert('Please enter a recipient email address.'); return; }
      if (!subject || !body) { alert('Subject and body cannot be empty.'); return; }

      const btn = document.getElementById('sendBtn');
      btn.textContent = 'Sending...';
      btn.disabled = true;

      try {
        const res = await fetch('/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ to, subject, body }),
});
        const data = await res.json();

        if (data.success) {
          showStatus('Email sent successfully!', 'green');
} else {
          showStatus('Error: ' + data.error, 'red');
}
} catch (err) {
        showStatus('Send failed. Check the console.', 'red');
        console.error(err);
} finally {
        btn.textContent = 'Send via Gmail';
        btn.disabled = false;
}
}

    function showStatus(msg, color) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = `mt-3 text-sm text-${color}-600`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 5000);
}
  </script>
</body>
</html>
